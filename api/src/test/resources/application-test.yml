server:
  port: 0

spring:
  threads:
    virtual:
      enabled: true

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true

  ai:
    retry:
      max-attempts: 1
    deepseek:
      api-key: test-deepseek-api-key
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-v4-flash
          temperature: 0
          max-tokens: 512
          response-format:
            type: json_object

logging:
  level:
    root: WARN
    me.nghlong3004.iom: INFO

iom:
  bot:
    intents:
      summary:
        action-keywords: [xem, tong, thong ke, bao nhieu, bao cao]
        today-keywords: [hom nay, ngay nay, today]
        month-keywords: [thang nay, month]
        expense-keywords: [chi, tieu, chi tieu]
        income-keywords: [thu, thu nhap, luong]
  telegram:
    enabled: false
    bot-token: test-token
    bot-username: test-bot
  client:
    base-url: http://localhost:5173
  security:
    jwt:
      secret-key: test-secret-key-with-at-least-thirty-two-bytes
      access-expiration: 15
      refresh-expiration: 10080
    cookie:
      secure: false
      same-site: lax
