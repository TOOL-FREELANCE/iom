services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-iom_dev}
      POSTGRES_USER: ${POSTGRES_USER:-iom}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iom}

    volumes:
      - iom_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iom} -d ${POSTGRES_DB:-iom_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile

    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy

    ports:
      - "127.0.0.1:${API_PORT:-8080}:8080"

    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: 8080

      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-iom_dev}
      DB_USERNAME: ${POSTGRES_USER:-iom}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-iom}

      DB_POOL_MAX_SIZE: ${DB_POOL_MAX_SIZE:-20}
      DB_POOL_MIN_IDLE: ${DB_POOL_MIN_IDLE:-5}

      TELEGRAM_BOT_ENABLED: ${TELEGRAM_BOT_ENABLED:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}

      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:-}

volumes:
  iom_postgres_data: